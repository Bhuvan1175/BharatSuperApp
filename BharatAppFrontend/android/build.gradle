buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.22"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        // Sonatype's snapshot server frequently returns 504 timeouts and can abort the
        // whole build. Restrict any Sonatype repo to SNAPSHOT versions only, so release
        // artifacts (e.g. com.google.prefab:cli:2.0.0, com.facebook.react:react-android)
        // resolve from Maven Central / Google Maven instead of failing on a timeout.
        all { repo ->
            if (repo instanceof org.gradle.api.artifacts.repositories.MavenArtifactRepository) {
                def url = repo.url.toString()
                if (url.contains("sonatype.org")) {
                    repo.mavenContent { snapshotsOnly() }
                }
            }
        }
    }
}
